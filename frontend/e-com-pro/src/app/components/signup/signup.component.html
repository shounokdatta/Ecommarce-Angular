<div class="signup-container">
  <div class="signup-card">
    <h2 class="signup-title">Create Account</h2>
    <p class="signup-subtitle">Join us today!</p>

    <form #signupForm="ngForm" (ngSubmit)="onSignup()" novalidate>
      <!-- Name -->
      <input type="text" placeholder="Name"
        [(ngModel)]="name" name="name"
        required minlength="3" #nameRef="ngModel" />
      <div *ngIf="nameRef.invalid && nameRef.touched">
        Name required (min 3)
      </div>

      <!-- Email -->
      <input type="email" placeholder="Email"
        [(ngModel)]="email" name="email"
        required email #emailRef="ngModel" />
      <div *ngIf="emailRef.invalid && emailRef.touched">
        Valid email required
      </div>

      <!-- Phone -->
      <input type="tel" placeholder="Phone"
        [(ngModel)]="phone" name="phone"
        required pattern="^[0-9]{10}$" #phoneRef="ngModel" />
      <div *ngIf="phoneRef.invalid && phoneRef.touched">
        10 digit phone required
      </div>

      <!-- Password -->
      <input type="password" placeholder="Password"
        [(ngModel)]="password" name="password"
        required minlength="7" #passRef="ngModel" />
      <div *ngIf="passRef.invalid && passRef.touched">
        Min 7 characters
      </div>
      <!-- Submit -->
      <button type="submit" class="signup-button" [disabled]="signupForm.invalid">
        Sign Up
      </button>
    </form>

<p class="login-link">Already have an account? <a routerLink="/login">Login</a></p> 
</div> 
</div>
